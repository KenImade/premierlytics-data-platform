#       username: ${POSTGRES_USER}
#       password: ${POSTGRES_PASSWORD}
#       db_name: ${POSTGRES_DB}
#       port: 5432

run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_db:
      username:
        env: POSTGRES_USER
      password: 
        env: POSTGRES_PASSWORD
      db_name: 
        env: POSTGRES_DB
      hostname: docker_postgres
      port: 5432
